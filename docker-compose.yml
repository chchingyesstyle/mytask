version: "3.9"

services:
  mytask:
    build: .
    expose:
      - "8080"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - mytask
    restart: unless-stopped
